<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Mirus Interiors</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 3rem;
            margin: 0 0 20px 0;
            font-weight: 700;
        }
        h2 {
            font-size: 1.5rem;
            margin: 0 0 30px 0;
            font-weight: 400;
            opacity: 0.9;
        }
        .message {
            font-size: 1.1rem;
            margin: 30px 0;
            line-height: 1.6;
        }
        .button {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        .button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .loading {
            margin-top: 30px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        
        <div class="message">
            <p>Sorry, we couldn't find the page you're looking for.</p>
            <p>Don't worry though - we're redirecting you back to our homepage!</p>
        </div>
        
        <a href="/" class="button">Go to Homepage</a>
        
        <div class="loading">
            <span class="spinner"></span>
            Redirecting automatically...
        </div>
    </div>

    <script>
        // Get the current path
        const currentPath = window.location.pathname;
        
        // Check if this is a valid route in our SPA
        const validRoutes = ['/', '/services', '/portfolio', '/testimonials', '/faq', '/contact'];
        
        // If it's a valid route, redirect to the main app
        if (validRoutes.includes(currentPath)) {
            // This is likely a direct navigation to a valid route
            // Redirect to the main app which will handle the routing
            window.location.href = '/';
        } else {
            // This is an unknown route, show the 404 page for a moment then redirect
            setTimeout(() => {
                window.location.href = '/';
            }, 3000);
        }
        
        // Also handle the case where someone manually navigates
        document.querySelector('.button').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = '/';
        });
    </script>
</body>
</html>
